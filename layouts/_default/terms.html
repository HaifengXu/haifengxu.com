{{ define "main" }}
  <section class="page-intro">
    <p class="eyebrow">{{ .Data.Plural | humanize }}</p>
    <h1>{{ .Title }}</h1>
    <p class="lede">Browse posts by topic.</p>
  </section>

  <section class="post-list" aria-label="Tag list">
    {{ range .Data.Terms.Alphabetical }}
      <article class="post-card">
        <div class="post-card-meta">
          <span>Topic</span>
          <span>{{ .Count }} posts</span>
        </div>
        <h3><a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }}</a></h3>
      </article>
    {{ end }}
  </section>
{{ end }}
